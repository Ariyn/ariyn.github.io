---
layout: default
title: Tagcloud
permalink: /tagcloud/
---

<h2 class="post">Tagcloud</h2>
{% assign tags = site.tags | sort %}
{% for tag_pair in tags %}
  {% assign tag = tag_pair[0] %}
  {% assign posts = tag_pair[1] %}
  {% assign tag_slug = tag | site_tag_slug %}
  <a href="{{ '/tags/' | append: tag_slug | append: '/' | relative_url }}">{{ tag }} <span>({{ posts.size }})</span></a>
{% endfor %}
