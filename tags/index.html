---
layout: default
title: Tags
permalink: /tags/
---

<h2 class="post">Tags</h2>
<ul>
  {% assign tags = site.tags | sort %}
  {% for tag_pair in tags %}
    {% assign tag = tag_pair[0] %}
    {% assign posts = tag_pair[1] %}
    {% assign tag_slug = tag | site_tag_slug %}
    <li><a href="{{ '/tags/' | append: tag_slug | append: '/' | relative_url }}">{{ tag }}</a> <span class="meta">({{ posts.size }})</span></li>
  {% endfor %}
</ul>
